services:
  # --- vLLM GEN instance (text generation, OpenAI-compatible) ---
  # Serves /v1/chat/completions and /v1/completions for the runners and proxy.
  # Uses --reasoning-parser qwen3 so thinking tokens land in `reasoning_content`
  # and don't pollute the answer string.
  vllm-gen:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${ATLAS_MODELS_DIR:-./models}:/models:ro
      - ${ATLAS_HF_CACHE:-./.cache/huggingface}:/root/.cache/huggingface
    command: >
      --model ${ATLAS_MODEL_PATH:-/models/Qwen3.5-9B-AWQ}
      --served-model-name ${ATLAS_GEN_MODEL_NAME:-qwen3.5-9b}
      --host 0.0.0.0 --port 8000
      --max-num-seqs ${ATLAS_GEN_MAX_NUM_SEQS:-32}
      --max-model-len ${ATLAS_GEN_CTX_SIZE:-32768}
      --gpu-memory-utilization ${ATLAS_GEN_GPU_MEM:-0.55}
      --tensor-parallel-size 1
      --enable-prefix-caching
      --reasoning-parser qwen3
      --trust-remote-code
    environment:
      - OMP_NUM_THREADS=4
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    ports:
      - "${ATLAS_GEN_PORT:-8000}:8000"
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 240s
    networks:
      - atlas

  # --- vLLM EMBED instance (4096-dim hidden states for the Lens) ---
  # vLLM is single-task per process — runs alongside vllm-gen sharing the GPU.
  # max_model_len is small (4096) because Lens calls only embed code snippets.
  vllm-embed:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${ATLAS_MODELS_DIR:-./models}:/models:ro
      - ${ATLAS_HF_CACHE:-./.cache/huggingface}:/root/.cache/huggingface
    command: >
      --model ${ATLAS_MODEL_PATH:-/models/Qwen3.5-9B-AWQ}
      --served-model-name ${ATLAS_EMBED_MODEL_NAME:-qwen3.5-9b-embed}
      --task embed
      --host 0.0.0.0 --port 8001
      --max-num-seqs ${ATLAS_EMBED_MAX_NUM_SEQS:-8}
      --max-model-len ${ATLAS_EMBED_CTX_SIZE:-4096}
      --gpu-memory-utilization ${ATLAS_EMBED_GPU_MEM:-0.20}
      --tensor-parallel-size 1
      --trust-remote-code
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    ports:
      - "${ATLAS_EMBED_PORT:-8001}:8001"
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 240s
    networks:
      - atlas

  # --- Geometric Lens (C(x)/G(x) scoring) ---
  geometric-lens:
    build:
      context: ./geometric-lens
    environment:
      - LLAMA_GEN_URL=http://vllm-gen:8000
      - LLAMA_EMBED_URL=http://vllm-embed:8001
      - LLAMA_URL=http://vllm-gen:8000  # back-compat for code paths still reading LLAMA_URL
      - LLAMA_GEN_MODEL=${ATLAS_GEN_MODEL_NAME:-qwen3.5-9b}
      - LLAMA_EMBED_MODEL=${ATLAS_EMBED_MODEL_NAME:-qwen3.5-9b-embed}
      - GEOMETRIC_LENS_ENABLED=true
      - PROJECT_DATA_DIR=/data/projects
    volumes:
      - lens-data:/data/projects
      - ${ATLAS_LENS_MODELS:-./geometric-lens/geometric_lens/models}:/app/geometric_lens/models:ro
    ports:
      - "${ATLAS_LENS_PORT:-31144}:31144"
    depends_on:
      vllm-gen:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:31144/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - atlas

  # --- V3 Pipeline Service ---
  v3-service:
    build:
      context: .
      dockerfile: v3-service/Dockerfile
    environment:
      - LLAMA_GEN_URL=http://vllm-gen:8000
      - LLAMA_EMBED_URL=http://vllm-embed:8001
      - ATLAS_LENS_URL=http://geometric-lens:31144
      - ATLAS_SANDBOX_URL=http://sandbox:8020
      - LLAMA_GEN_MODEL=${ATLAS_GEN_MODEL_NAME:-qwen3.5-9b}
      - LLAMA_EMBED_MODEL=${ATLAS_EMBED_MODEL_NAME:-qwen3.5-9b-embed}
    ports:
      - "${ATLAS_V3_PORT:-8070}:8070"
    depends_on:
      vllm-gen:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
      geometric-lens:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8070/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - atlas

  # --- Sandbox (isolated code execution) ---
  sandbox:
    build:
      context: ./sandbox
    tmpfs:
      - /tmp/sandbox:size=512M
    read_only: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "${ATLAS_SANDBOX_PORT:-30820}:8020"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8020/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - atlas

  # --- ATLAS Proxy v2 (agent loop + grammar + Aider format) ---
  atlas-proxy:
    build:
      context: ./atlas-proxy
    environment:
      - ATLAS_PROXY_PORT=8090
      - LLAMA_GEN_URL=http://vllm-gen:8000
      - LLAMA_EMBED_URL=http://vllm-embed:8001
      - ATLAS_INFERENCE_URL=http://vllm-gen:8000  # back-compat
      - ATLAS_LLAMA_URL=http://vllm-gen:8000  # back-compat
      - ATLAS_LENS_URL=http://geometric-lens:31144
      - ATLAS_SANDBOX_URL=http://sandbox:8020
      - ATLAS_V3_URL=http://v3-service:8070
      - ATLAS_AGENT_LOOP=1
      - LLAMA_GEN_MODEL=${ATLAS_GEN_MODEL_NAME:-qwen3.5-9b}
    volumes:
      - ${ATLAS_PROJECT_DIR:-.}:/workspace
    working_dir: /workspace
    ports:
      - "${ATLAS_PROXY_PORT:-8090}:8090"
    depends_on:
      vllm-gen:
        condition: service_healthy
      geometric-lens:
        condition: service_healthy
      v3-service:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas

volumes:
  lens-data:

networks:
  atlas:
    driver: bridge
