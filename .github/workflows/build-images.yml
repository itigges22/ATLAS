# Builds and publishes ATLAS service images to GHCR.
#
# Image names: ghcr.io/itigges22/atlas-{proxy,v3,lens,llama,sandbox}
#
# Tag scheme:
#   - main branch push  -> :latest, :sha-<short>
#   - dev branch push   -> :dev,    :sha-<short>
#   - git tag vX.Y.Z    -> :X.Y.Z,  :X.Y,  :latest
#   - manual dispatch   -> :sha-<short>
#
# All builds are amd64 only for v1 (CUDA on llama-server is the constraining
# dimension; the other four services are small enough that adding arm64 later
# is a single matrix entry. PC-052.)

name: Build & publish container images

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
    paths:
      - "atlas-proxy/**"
      - "v3-service/**"
      - "geometric-lens/**"
      - "inference/**"
      - "sandbox/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: proxy
            context: ./atlas-proxy
            dockerfile: ./atlas-proxy/Dockerfile
          - name: v3
            # Root context: v3-service/Dockerfile reads sibling dirs at build time.
            context: .
            dockerfile: ./v3-service/Dockerfile
          - name: lens
            context: ./geometric-lens
            dockerfile: ./geometric-lens/Dockerfile
          - name: sandbox
            context: ./sandbox
            dockerfile: ./sandbox/Dockerfile
          - name: llama
            context: ./inference
            dockerfile: ./inference/Dockerfile.v31

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (llama only)
        if: matrix.service.name == 'llama'
        # CUDA devel base + build artifacts can exceed the 14 GB free on
        # ubuntu-latest. Reclaim the obvious wastage before docker pulls.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/atlas-${{ matrix.service.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          provenance: false
