name: vLLM wire tests

# Wire-level integration tests on every push/PR. Spins up an in-process HTTP
# server that mimics vLLM and verifies every ATLAS code path that talks to
# the model sends and parses the right shape. No GPU needed — strongest
# regression signal short of reserving an H100.
#
# Note on security: all `run:` blocks below use only static strings and
# environment values that this workflow itself controls. No untrusted
# user input (issue title, PR body, commit message, etc.) is interpolated
# into shell, which is why no env: indirection is needed here.

on:
  push:
    branches: [main, dev, staging]
    paths:
      - "benchmark/**"
      - "benchmarks/**"
      - "atlas/**"
      - "v3-service/**"
      - "geometric-lens/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/vllm-wire.yml"
  pull_request:
    branches: [main, dev, staging]

jobs:
  wire-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx
          pip install --extra-index-url https://download.pytorch.org/whl/cpu "torch>=2.0"
          pip install -e .

      - name: Run vLLM wire tests
        run: python -m pytest tests/integration/test_vllm_wire.py -v --tb=short

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/infrastructure \
            --ignore=tests/integration/test_e2e_flow.py \
            --ignore=tests/integration/test_e2e_training.py \
            --ignore=tests/integration/test_security.py \
            --ignore=tests/integration/test_atlas_proxy.py \
            --ignore=tests/e2e \
            -q

      - name: Validate docker-compose YAML
        run: python -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"

      - name: Validate shell scripts
        run: |
          for f in benchmarks/h200/entrypoint.sh \
                   benchmarks/h200/preflight.sh \
                   benchmarks/h200/launch_on_h200.sh \
                   benchmarks/run_lcb_v6.sh \
                   benchmarks/run_full_baseline.sh; do
            bash -n "$f" && echo "OK: $f"
          done
