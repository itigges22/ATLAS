benchmark: c_eval
section: section_a_knowledge_stem
version: "3.0.1"

model:
  name: Qwen3.5-9B-Q6_K
  quantization: Q6_K

pipeline:
  name: ATLAS V3.0.1
  mode: raw_pipeline
  thinking: disabled (nothink)

sampling:
  temperature: 0.6
  top_p: 0.95
  max_tokens: 1024
  seed: 42

evaluation:
  format: MCQ (A-D, 4 options, Chinese)
  scoring: accuracy
  ci_method: bootstrap n=1000
  note: >
    Using val split (1346 questions) because test split has no public answers.
    Qwen model card likely uses test split submitted to leaderboard.
    Val split serves as proxy; disclose this difference in report.

baseline:
  source: "Qwen3.5-9B model card"
  score: 88.2
  conditions: "bf16, thinking mode, test split"
