benchmark: ifeval
section: section_b_instruction_following
version: "3.0.1"

model:
  name: Qwen3.5-9B-AWQ
  sha256: 91898433cf5ce0a8f45516a4cc3e9343b6e01d052d01f684309098c66a326c59
  quantization: AWQ-Q4
  context_length: 32768
  parallel_slots: 1
  kv_cache_type: q4_0

pipeline:
  name: ATLAS V3.0.1
  mode: raw_pipeline
  components_enabled:
    plan_search: false
    budget_forcing: false
    geometric_lens: false
    pr_cot_repair: false
    div_sampling: false
  rationale: >
    Instruction-following benchmark with programmatic verification.
    Direct model inference, no V3 pipeline components.

sampling:
  temperature: 0.6
  top_p: 0.95
  max_tokens: 8192
  seed: 42

evaluation:
  format: free-form text with verifiable constraints
  scoring: strict prompt-level accuracy (all instructions satisfied)
  scoring_alt: instruction-level accuracy, loose mode
  evaluator: official Google IFEval library (Apache 2.0)
  ci_method: bootstrap n=1000
  ci_level: 0.95

baseline:
  source: "Qwen3.5-9B model card (https://huggingface.co/Qwen/Qwen3.5-9B)"
  score: 91.5
  metric: "strict prompt-level accuracy"
  conditions: "bf16, thinking mode, Qwen recommended sampling"

hardware:
  gpu: "NVIDIA GeForce RTX 5060 Ti 16GB"
  vram_used: "~11 GB"
  platform: "K3s cluster, vLLM container"
